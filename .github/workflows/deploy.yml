name: Deploy to Vercel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run DB migrations (if DATABASE_URL)
        if: ${{ secrets.DATABASE_URL }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Seed founder (if provided)
        if: ${{ secrets.FOUNDER_EMAIL && secrets.DATABASE_URL }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FOUNDER_EMAIL: ${{ secrets.FOUNDER_EMAIL }}
        run: |
          FOUNDER_EMAIL="$FOUNDER_EMAIL" npm run seed:founder || true

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
name: Build and Push Docker

on:
  push:
    branches: [ main ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm ci

      - name: Run DB migrations (optional)
        if: ${{ secrets.DATABASE_URL }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Seed founder (optional)
        if: ${{ secrets.DATABASE_URL && secrets.FOUNDER_EMAIL }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FOUNDER_EMAIL: ${{ secrets.FOUNDER_EMAIL }}
          FOUNDER_NAME: ${{ secrets.FOUNDER_NAME }}
          FOUNDER_FUNDRAISER_TITLE: ${{ secrets.FOUNDER_FUNDRAISER_TITLE }}
        run: npm run seed:founder
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pollacle:latest

      - name: Optional: Trigger provider deployment
        if: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          echo "Triggering provider deployment via webhook"
          curl -X POST -H "Content-Type: application/json" -d '{"ref":"main"}' "${{ secrets.DEPLOY_WEBHOOK_URL }}" || true

      - name: Provider-specific notes (DNS/TLS)
        run: |
          echo "This workflow builds and pushes the Docker image to GHCR."
          echo "Add provider-specific deploy steps here (Cloud Run, ECS, Render, Fly.io, etc.)."

      # Extend with deployment steps (Kubernetes, Cloud Run, etc.)
